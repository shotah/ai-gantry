# Build the distroless kernel image and push to Docker Hub (+ GHCR).
# Secrets (same pattern as hytale-server-container):
#   DOCKER_HUB_USERNAME
#   DOCKER_HUB_ACCESS_TOKEN
name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/**"
      - "assets/**"
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/docker.yml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

env:
  HUB_IMAGE: shotah/ai-gantry
  GHCR_IMAGE: ghcr.io/shotah/ai-gantry

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.HUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=sha-

      - name: Set build args
        id: buildargs
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="edge"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build for smoke (amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.HUB_IMAGE }}:ci-smoke
          build-args: |
            VERSION=${{ steps.buildargs.outputs.version }}
            COMMIT=${{ steps.buildargs.outputs.commit }}
            DATE=${{ steps.buildargs.outputs.date }}
          cache-from: type=gha,scope=ai-gantry
          cache-to: type=gha,mode=max,scope=ai-gantry

      - name: Smoke — gantry version
        run: |
          out=$(docker run --rm "${{ env.HUB_IMAGE }}:ci-smoke" version)
          echo "$out"
          echo "$out" | grep -q 'gantry '

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          build-args: |
            VERSION=${{ steps.buildargs.outputs.version }}
            COMMIT=${{ steps.buildargs.outputs.commit }}
            DATE=${{ steps.buildargs.outputs.date }}
          cache-from: type=gha,scope=ai-gantry
          cache-to: type=gha,mode=max,scope=ai-gantry
