name: ci

on:
  push:
    branches: [main]
  pull_request:

# contents:write needed to push the coverage badge to gh-pages on main.
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test + coverage
        run: |
          go test ./internal/... ./cmd/... ./examples/... -coverprofile=coverage.out -covermode=atomic -count=1
          go tool cover -func=coverage.out | tee coverage.txt

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Build (static)
        env:
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w" -o /tmp/gantry ./cmd/gantry
          file /tmp/gantry

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt

      - name: Create badges directory
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: mkdir -p badges

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          chmod +x scripts/coverage-badge.sh
          ./scripts/coverage-badge.sh coverage.out badges/coverage.svg

      - name: Push badge to gh-pages branch
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          BADGE="${GITHUB_WORKSPACE}/badges/coverage.svg"
          WORKDIR=$(mktemp -d)
          cd "$WORKDIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          if git fetch --depth 1 origin gh-pages; then
            git checkout -B gh-pages FETCH_HEAD
          else
            git checkout --orphan gh-pages
          fi

          mkdir -p badges
          cp "$BADGE" badges/coverage.svg
          git add badges/coverage.svg
          if git diff --staged --quiet; then
            echo "No badge change; skipping push."
          else
            git commit -m "chore: update coverage badge [skip ci]"
            git push origin HEAD:gh-pages
          fi
