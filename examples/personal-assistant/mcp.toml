# MCP server manifest — listed = granted (process may start).
# Mounted at /etc/gantry/mcp.toml. Tool names reach the model as {name}__{tool}.
#
# Kernel-only image: leave everything commented until static binaries exist on PATH.
# Full local-agent image (binaries baked in): ../../local-agent/ (cd local-agent && make build)
#
# Optional host-side filters (after tools/list):
#   tools = ["…"]          # allowlist
#   exclude = ["raw_*"]    # denylist
#   tools_prefix = "garm"  # override {prefix}__{tool}

